services:
  # llama-server is now run natively via ik_llama.cpp (Windows service, port 8080)
  # for improved CPU performance. See scripts/start-llama.bat to start manually.
  # Docker containers reach it via host.docker.internal:8080

  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.zeroclaw
    volumes:
      - ./configs/zeroclaw:/home/zeroclaw/.zeroclaw
      - ./obsidian-vault:/vault
    depends_on:
      searxng:
        condition: service_started
    restart: unless-stopped
    environment:
      - ZEROCLAW_CONFIG_DIR=/home/zeroclaw/.zeroclaw
    extra_hosts:
      - "host.docker.internal:host-gateway"

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    volumes:
      - ./kiwix-data:/data
    command: --library /data/library.xml
    ports:
      - "9090:80"
    restart: unless-stopped
