services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cpu
    volumes:
      - ./models:/models:ro
    command: >
      --model /models/gemma-4-education.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
      --threads 8
      --parallel 2
      --n-predict 2048
      --repeat-penalty 1.1
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # GPU variant: swap image to ghcr.io/ggml-org/llama.cpp:server-cuda
  # and add: deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }

  zeroclaw:
    build:
      context: .
      dockerfile: Dockerfile.zeroclaw
    volumes:
      - ./configs/zeroclaw:/home/zeroclaw/.zeroclaw
      - ./obsidian-vault:/vault
    depends_on:
      llama-server:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped
    environment:
      - ZEROCLAW_CONFIG_DIR=/home/zeroclaw/.zeroclaw

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    ports:
      - "8888:8080"
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    volumes:
      - ./kiwix-data:/data:ro
    command: /data/
    ports:
      - "9090:80"
    restart: unless-stopped
