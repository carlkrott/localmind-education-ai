api_key = "localmind-local"
api_url = "http://llama-server:8080/v1"
default_provider = "custom:http://llama-server:8080/v1"
default_model = "gemma-4-education"
default_temperature = 0.7

[model_providers]

[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_max_entries = 200

[query_classification]
enabled = true

[[query_classification.rules]]
hint = "minor"
keywords = ["status", "health", "ping", "uptime", "disk", "ram", "check", "list"]
max_length = 80

[autonomy]
level = "full"
workspace_only = false
allowed_commands = ["zeroclaw", "git", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date", "df", "free", "ps", "uptime", "curl", "wget", "python3", "bash", "sh", "whoami", "id", "mkdir", "cp", "mv", "tar", "sqlite3"]
forbidden_paths = []
max_actions_per_hour = 200
max_cost_per_day_cents = 0
require_approval_for_medium_risk = false
block_high_risk_commands = false
auto_approve = ["file_read", "memory_recall", "shell_exec", "file_write", "http_request", "web_search", "web_fetch"]
always_ask = []
allowed_roots = ["/"]
non_cli_excluded_tools = []

[runtime]
kind = "native"

[reliability]
provider_retries = 2
provider_backoff_ms = 500

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 2

[agent]
compact_context = true
max_tool_iterations = 100
max_history_messages = 80
parallel_tools = false
tool_dispatcher = "xml"

[skills]
open_skills_enabled = true
prompt_injection_mode = "full"

[heartbeat]
enabled = false
interval_minutes = 30

[cron]
enabled = true
max_run_history = 50

[channels_config]
cli = true
message_timeout_secs = 600

[memory]
backend = "sqlite"
auto_save = true
hygiene_enabled = true
archive_after_days = 14
purge_after_days = 60
conversation_retention_days = 60
embedding_provider = "none"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
vector_weight = 0.7
keyword_weight = 0.3
min_relevance_score = 0.4
embedding_cache_size = 10000
chunk_max_tokens = 512
response_cache_enabled = false
response_cache_ttl_minutes = 60
response_cache_max_entries = 5000
snapshot_enabled = true
snapshot_on_hygiene = true
auto_hydrate = true

[tunnel]
provider = "none"

[gateway]
port = 42617
host = "0.0.0.0"
require_pairing = true
allow_public_bind = false

[composio]
enabled = false
entity_id = "default"

[secrets]
encrypt = false

[browser]
enabled = false
allowed_domains = []
backend = "agent_browser"
native_headless = true

[http_request]
enabled = true
allowed_domains = ["llama-server", "searxng", "kiwix", "*"]
max_response_size = 2000000
timeout_secs = 60

[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = false

[web_fetch]
enabled = true
allowed_domains = ["*"]
blocked_domains = []
max_response_size = 1000000
timeout_secs = 30

[web_search]
enabled = true
provider = "duckduckgo"
max_results = 8
timeout_secs = 20

[proxy]
enabled = false
no_proxy = []
scope = "zeroclaw"
services = []

[identity]
format = "openclaw"

[cost]
enabled = false
daily_limit_usd = 0.0
monthly_limit_usd = 0.0
warn_at_percent = 80
allow_override = false

[hardware]
enabled = false
transport = "None"
baud_rate = 115200
workspace_datasheets = false

[agents]

[hooks]
enabled = true

[transcription]
enabled = false

[channels_config.telegram]
bot_token = "REDACTED_TOKEN"
allowed_users = ["8437429413"]
stream_mode = "partial"
draft_update_interval_ms = 1500
interrupt_on_new_message = false
mention_only = false
